name: Docker Image Release

# 触发条件：
# 1. 发布新版本时自动触发
# 2. 手动触发（GitHub Actions 页面点击 "Run workflow"）
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像标签 (留空则使用 latest)'
        required: false
        default: 'latest'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push to ghcr.io
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      packages: write  # 推送到 ghcr.io 需要

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # 发布版本时：使用 release tag + latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # 手动触发时：使用输入的 tag，默认 latest
            type=raw,value=${{ inputs.tag || 'latest' }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          load: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CARGO_INSTALL_STRICT=1
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}

      - name: Verify image
        run: |
          echo "✅ 镜像已推送到: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo ""
          echo "镜像标签:"
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | sed 's/^/  /'
          echo ""
          echo "使用方式:"
          echo "  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "  docker run -it ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest /usr/bin/zsh"
