name: tool-installer Migration Verify

on:
  push:
    branches:
      - 'feat/tool-installer-migration'
  pull_request:
    branches:
      - 'feat/tool-installer-migration'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # ── Dry-run（快速，无网络）──
  dry-run:
    name: Dry-run (all modules)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Dry-run dev (full)
        run: python3 vendor/tool-installer install dev --dry-run
      - name: Dry-run each module
        run: |
          for module in cargo-binstall build-base cargo-tools shell-tools editors languages lsp-servers extras; do
            echo "--- $module ---"
            python3 vendor/tool-installer install "$module" --dry-run
          done

  # ── Bootstrap ──
  bootstrap:
    name: Bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Run Layer 0 (tool-installer binary only)
        run: bash setup-new.sh --bootstrap
      - name: Verify
        run: |
          ~/.local/bin/tool-installer --help
          ~/.local/bin/tool-installer install dev --dry-run

  # ── build-base: Rust 工具链 ──
  apply-build-base:
    name: "Apply: build-base (Rust)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build-base
        run: python3 vendor/tool-installer install build-base
      - name: Verify
        run: |
          rustc --version
          cargo --version
          rustfmt --version
          clippy-driver --version

  # ── cargo-binstall: 预编译安装器 ──
  apply-cargo-binstall:
    name: "Apply: cargo-binstall"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install cargo-binstall
        run: python3 vendor/tool-installer install cargo-binstall
      - name: Verify
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cargo-binstall -V

  # ── cargo-tools: 28 个 Rust 工具 ──
  apply-cargo-tools:
    name: "Apply: cargo-tools (28 crates)"
    needs: [apply-cargo-binstall, apply-build-base]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Clean stale cargo install metadata
        run: rm -f ~/.cargo/.crates.toml ~/.cargo/.crates2.json
      - name: Install cargo-tools (needs cargo-binstall + build-base)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          python3 vendor/tool-installer install cargo-binstall
          python3 vendor/tool-installer install build-base
          python3 vendor/tool-installer install cargo-tools
      - name: Verify key tools
        run: |
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          bat --version
          eza --version
          fd --version || fdfind --version
          tokei --version
          zoxide --version
          mdbook --version
          mise --version
          uv --version
          navi --version || true
          gitui --version || true
          kondo --help >/dev/null
          jaq --version
          nu --version
          cargo-audit --version
          macchina --version || true
          tree-sitter --version

  # ── languages: go, node, pnpm, zig, yazi, gopls ──
  apply-languages:
    name: "Apply: languages (mise)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Install and verify languages
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          # Trust and install
          mise trust
          python3 vendor/tool-installer install languages
          # Add mise shims to PATH and verify
          export PATH="$(mise where)/shims:$HOME/.local/share/mise/shims:$PATH"
          mise list
          go version || true
          node --version || true
          pnpm --version || true
          zig version || true

  # ── shell-tools: starship ──
  apply-shell-tools:
    name: "Apply: shell-tools"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install shell-tools
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p ~/.local/bin
          python3 vendor/tool-installer install shell-tools
      - name: Verify
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          starship -V

  # ── editors: neovim, helix, zellij, yq ──
  # 全部是 github-release，不需要额外 manager
  apply-editors:
    name: "Apply: editors"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install editors
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p ~/.local/bin
          python3 vendor/tool-installer install editors
      - name: Verify
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          nvim --version | head -1
          hx --version
          zellij --version
          yq --version

  # ── lsp-servers: npm/uv/github-release LSP ──
  # 依赖 node（来自 languages），需要等 languages 完成
  # CI 中单独安装 node 作为前置
  apply-lsp-servers:
    name: "Apply: lsp-servers"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install uv (for pyright)
        run: pip install uv
      - name: Install npm LSP servers directly
        run: |
          npm install -g typescript-language-server typescript yaml-language-server bash-language-server
      - name: Install remaining LSP servers via tool-installer
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p ~/.local/bin
          python3 vendor/tool-installer install lsp-servers
      - name: Verify
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          typescript-language-server --version
          pyright --version || true
          yaml-language-server --version || true
          bash-language-server --version
          marksman --version || true
          zls --version || true
          lua-language-server --version || true

  # ── extras: xdotter ──
  apply-extras:
    name: "Apply: extras"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install extras
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p ~/.local/bin
          python3 vendor/tool-installer install extras
      - name: Verify
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          xd --version || true

  # ── 全量安装验证（等所有模块通过后）──
  full-install:
    name: "Apply: dev (full)"
    needs: [dry-run, bootstrap, apply-cargo-binstall, apply-build-base, apply-cargo-tools, apply-shell-tools, apply-editors, apply-languages, apply-lsp-servers, apply-extras]
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Clean stale cargo install metadata
        run: rm -f ~/.cargo/.crates.toml ~/.cargo/.crates2.json
      - name: Install mise (prerequisite)
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install uv
        run: pip install uv
      - name: Pre-install npm LSP servers
        run: npm install -g typescript-language-server typescript yaml-language-server bash-language-server
      - name: Full install
        run: |
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          python3 vendor/tool-installer install dev
      - name: Comprehensive verification
        run: |
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          echo "=== Rust ==="
          rustc --version && cargo --version
          echo "=== Editors ==="
          nvim --version | head -1
          hx --version
          zellij --version
          yq --version
          echo "=== Cargo Tools ==="
          bat --version && eza --version && fd --version
          tokei --version && zoxide --version
          nu --version && uv --version && mise --version
          echo "=== Shell Tools ==="
          starship -V
          echo "=== Languages ==="
          go version 2>/dev/null || echo "go: skipped"
          node --version 2>/dev/null || echo "node: skipped"
          echo "=== LSP ==="
          typescript-language-server --version
          bash-language-server --version
          echo "=== All passed ==="

  # ── 重复安装验证：在已安装过的环境中再次执行 install dev ──
  # 验证 version_probe 等缓存/跳过逻辑的正确性，避免
  # "首次安装成功但重复安装报错" 的问题（如 zls version_probe regex）
  re-install:
    name: "Re-install: dev (idempotency)"
    needs: [full-install]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Clean stale cargo install metadata
        run: rm -f ~/.cargo/.crates.toml ~/.cargo/.crates2.json
      - name: Install mise (prerequisite)
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install uv
        run: pip install uv
      - name: Pre-install npm LSP servers
        run: npm install -g typescript-language-server typescript yaml-language-server bash-language-server
      - name: Second install (should skip all satisfied tools)
        run: |
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          python3 vendor/tool-installer install dev
