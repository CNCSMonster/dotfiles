name: tool-installer Migration Verify

on:
  push:
    branches:
      - 'feat/tool-installer-migration'
  pull_request:
    branches:
      - 'feat/tool-installer-migration'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # ── Dry-run（快速，无网络）──
  dry-run:
    name: Dry-run (all modules)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Dry-run dev (full)
        run: python3 vendor/tool-installer install dev --dry-run
      - name: Dry-run each module
        run: |
          for module in build-base cargo-tools editors languages lsp-servers extras; do
            echo "--- $module ---"
            python3 vendor/tool-installer install "$module" --dry-run
          done

  # ── Bootstrap ──
  bootstrap:
    name: Bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Run Layer 0
        run: bash scripts/layer0-bootstrap.sh
      - name: Verify
        run: |
          ~/.local/bin/tool-installer --help
          ~/.local/bin/tool-installer install dev --dry-run

  # ── build-base: Rust 工具链 ──
  apply-build-base:
    name: "Apply: build-base (Rust)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build-base
        run: python3 vendor/tool-installer install build-base
      - name: Verify
        run: |
          rustc --version
          cargo --version
          rustfmt --version
          clippy-driver --version

  # ── cargo-tools: 29 个 Rust 工具（最耗时）──
  apply-cargo-tools:
    name: "Apply: cargo-tools (29 crates)"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install cargo-tools (includes build-base)
        run: python3 vendor/tool-installer install cargo-tools
      - name: Verify key tools
        run: |
          bat --version
          eza --version
          fd --version || fdfind --version
          starship --version
          tokei --version
          zoxide --version
          gitui --version || true
          mdbook --version
          nu --version
          mise --version
          uv --version

  # ── editors: neovim, helix, zellij, yq ──
  apply-editors:
    name: "Apply: editors"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install editors
        run: python3 vendor/tool-installer install editors
      - name: Verify
        run: |
          ~/.local/bin/nvim --version | head -1
          hx --version
          zellij --version
          yq --version

  # ── languages: go, node, pnpm, zig, yazi, gopls ──
  apply-languages:
    name: "Apply: languages (mise)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install languages
        run: python3 vendor/tool-installer install languages
      - name: Verify
        run: |
          eval "$(mise activate bash)"
          mise list
          go version
          node --version
          pnpm --version
          zig version

  # ── lsp-servers: npm/uv/github-release LSP ──
  apply-lsp-servers:
    name: "Apply: lsp-servers"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install lsp-servers (includes languages)
        run: python3 vendor/tool-installer install lsp-servers
      - name: Verify
        run: |
          typescript-language-server --version || true
          pyright --version || true
          yaml-language-server --version || true
          bash-language-server --version || true

  # ── extras: xdotter, cargo-binstall ──
  apply-extras:
    name: "Apply: extras"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install extras
        run: python3 vendor/tool-installer install extras
      - name: Verify
        run: |
          xd --version || true
          cargo-binstall --version || true

  # ── 全量安装验证 ──
  full-install:
    name: "Apply: dev (full)"
    needs: [dry-run, bootstrap, apply-build-base, apply-cargo-tools, apply-editors, apply-languages, apply-lsp-servers, apply-extras]
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Full install
        run: python3 vendor/tool-installer install dev
      - name: Comprehensive verification
        run: |
          echo "=== Rust ==="
          rustc --version && cargo --version
          echo "=== Editors ==="
          hx --version && zellij --version && yq --version
          echo "=== Languages ==="
          go version 2>/dev/null || echo "go: skipped"
          node --version 2>/dev/null || echo "node: skipped"
          echo "=== CLI Tools ==="
          bat --version && eza --version && starship --version
          echo "=== All passed ==="
