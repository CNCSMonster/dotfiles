name: Dockerfile Build Check

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Dockerfile
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      # 允许读取仓库内容，用于 GitHub API 认证（避免 mise/cargo-binstall 限流）
    env:
      DOCKER_BUILDKIT: 1
      # 启用 CI 严格模式，任何 Rust 工具安装失败都会终止构建
      CARGO_INSTALL_STRICT: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: dotfiles-env:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CARGO_INSTALL_STRICT=1
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}

      - name: Verify installation
        run: |
          docker run --rm dotfiles-env:ci /root/dotfiles/scripts/verify-docker-build.sh

