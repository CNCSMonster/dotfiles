<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!-- ============================================================ -->
  <!-- 全局默认字体回退链                                             -->
  <!-- ============================================================ -->

  <!-- Sans-serif 字体回退：Noto Sans → CJK → Emoji -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Noto Sans</family>
      <family>Noto Sans CJK SC</family>
      <family>Noto Sans CJK TC</family>
      <family>Noto Sans CJK JP</family>
      <family>Noto Sans CJK KR</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- Serif 字体回退：Noto Serif → CJK → Emoji -->
  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Serif</family>
      <family>Noto Serif CJK SC</family>
      <family>Noto Serif CJK TC</family>
      <family>Noto Serif CJK JP</family>
      <family>Noto Serif CJK KR</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- Monospace 字体回退：WezTerm 配置的完整回退链 -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>JetBrains Mono</family>
      <family>FiraCode Nerd Font</family>
      <family>DejaVu Sans Mono</family>
      <family>Noto Sans CJK SC</family>
      <family>Noto Sans CJK TC</family>
      <family>Noto Sans CJK JP</family>
      <family>Noto Sans CJK KR</family>
      <family>Noto Sans Symbols2</family>
      <family>Noto Serif Grantha</family>
      <family>Noto Sans Gujarati UI</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- ============================================================ -->
  <!-- Windows 字体别名映射（兼容 PDF/网页渲染）                      -->
  <!-- ============================================================ -->
  <alias>
    <family>Arial</family>
    <accept><family>Liberation Sans</family></accept>
  </alias>
  <alias>
    <family>Times New Roman</family>
    <accept><family>Liberation Serif</family></accept>
  </alias>
  <alias>
    <family>Courier New</family>
    <accept><family>Liberation Mono</family></accept>
  </alias>

  <!-- ============================================================ -->
  <!-- Emoji 全局启用 Noto Color Emoji                                -->
  <!-- ============================================================ -->
  <alias>
    <family>emoji</family>
    <prefer>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- ============================================================ -->
  <!-- 禁用不需要的位图字体（避免渲染为豆腐块）                       -->
  <!-- ============================================================ -->
  <selectfont>
    <rejectfont>
      <pattern>
        <patelt name="scalable"><bool>false</bool></patelt>
      </pattern>
    </rejectfont>
  </selectfont>
</fontconfig>
