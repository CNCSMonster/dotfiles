[tool-installer]
manifest = "./manifest.toml"

# ── Layer 1a: 编译基础设施 ──
[build-base]
rustup-install = "安装 rustup（vendor 脚本）"
"rust@stable" = "Rust stable toolchain"

# ── Layer 1b: Cargo 预编译安装器（独立，不需要 Rust）──
# 必须在 cargo-tools 之前安装，因为 cargo-tools 中的工具使用 binstall_first
[cargo-binstall]
"cargo-binstall@v1.19.1" = { desc = "Cargo 预编译安装器", allow_fail = true }

# ── Layer 1c: Cargo 工具（依赖 Rust + cargo-binstall）──
[cargo-tools]
depends = ["build-base", "cargo-binstall"]
"sccache@0.15.0" = { desc = "编译缓存", allow_fail = true }
wild-linker = { desc = "快速链接器", allow_fail = true }
"bat@0.26.1" = "Cat 替代品"
"eza@0.23.4" = "ls 替代品"
"fd-find@10.4.2" = "find 替代品"
"zoxide@0.9.9" = "cd 替代品"
"tokei@14.0.0" = "代码统计"
"navi@2.24.0" = "交互式命令行"
"gitui@0.28.1" = "Git TUI"
"kondo@0.9.0" = "项目清理"
"jaq@3.0.0" = "jq 替代品"
"mdbook@0.5.2" = "文档生成器"
"mdbook-mermaid@0.17.0" = "mdbook 图表"
"gen-mdbook-summary@0.0.10" = "mdbook 目录"
"tree-sitter-cli@0.26.8" = { desc = "语法解析器", allow_fail = true }
"tree-sitter-grep@0.1.0" = { desc = "语法感知搜索", allow_fail = true }
"tree-sitter-show-ast@0.0.2" = { desc = "AST 可视化", allow_fail = true }
"macchina@6.4.0" = "系统信息"
"conceal@0.7.0" = "隐藏敏感信息"
"rust-script@0.36.0" = "Rust 脚本运行器"
"parallel-disk-usage@0.22.0" = "磁盘分析"
"nu@0.112.2" = "现代 Shell"
"uv@0.11.18" = "Python 包管理器"
"mise@2026.4.5" = "版本管理器"
"cargo-audit@0.22.1" = "依赖审计"
cargo-fuzz = { desc = "模糊测试", allow_fail = true }
grcov = { desc = "代码覆盖率", allow_fail = true }
cargo-tarpaulin = { desc = "代码覆盖率", allow_fail = true }

# ── Layer 1f: 静态网站工具（独立，github-release 预编译）──
[zola]
"zola@v0.22.1" = "静态网站生成器"

# ── Layer 1c: Shell 工具（独立，不需要 Rust）──
[shell-tools]
"starship@v1.24.2" = "Shell prompt"

# ── Layer 1d: 编辑器和终端工具（独立，不需要 Rust）──
[editors]
"neovim@v0.12.2" = "Neovim 编辑器"
"helix@25.07.1" = "Helix 编辑器"
"zellij@v0.44.1" = "终端复用器"
"yq@v4.52.4" = "YAML/JSON 处理器"

# ── Layer 1d: 语言运行时（独立）──
[languages]
"go@1.23.4" = "Go via mise"
"node@22.22.3" = "Node.js via mise"
"pnpm@10.20.0" = "pnpm via mise"
"zig@0.16.0" = "Zig via mise"
"yazi@26.1.22" = "终端文件管理器 via mise"
"gopls@0.22.0" = "Go LSP via mise"

# ── Layer 1e: LSP 服务器 ──
# 注意：不依赖 languages，因为 CI 中 node/uv 由前置步骤安装
[lsp-servers]
"typescript-lsp@5.3.0" = { desc = "TypeScript LSP", allow_fail = true }
"pyright@1.1.410" = { desc = "Python LSP", allow_fail = true }
"yaml-lsp@1.23.0" = "YAML LSP"
"bash-lsp@5.6.0" = "Bash LSP"
"marksman@2026-02-08" = "Markdown LSP"
"zls@0.15.1" = "Zig LSP"
"lua-lsp@3.17.1" = "Lua LSP"
"qwen-code@0.17.0" = { desc = "Qwen Code", allow_fail = true }

# ── Layer 1f: 其他（独立）──
[extras]
"xdotter@v0.5.2" = "配置部署工具"

# ── 全量安装 ──
[dev]
depends = ["build-base", "cargo-binstall", "cargo-tools", "shell-tools", "editors", "languages", "lsp-servers", "extras", "zola"]
