# Manifest for dotfiles development environment
# Migrated from: dotfiles/shells/common/install-functions.sh
# Tool count: 45+ tools across 6 manager types

# ============================================================
# GitHub release manager configuration
# ============================================================

[_github-release]
github_mirrors = ["https://mirror.ghproxy.com"]
timeout = 60
retry = 3

# ============================================================
# Languages & Toolchains
# ============================================================

[rust]
[rust.linux]
manager = "rustup"
components = ["clippy", "rustfmt", "rust-analyzer"]
profile = "minimal"
set_default = true

# ============================================================
# Editors
# ============================================================

[neovim]
[neovim.linux]
manager = "github-release"
repo = "neovim/neovim"
asset = "nvim-linux-x86_64.tar.gz"
bin = "nvim-linux-x86_64/bin/nvim"
install_name = "nvim"
[neovim.linux.version_probe]
command = ["{bin}", "--version"]
regex = "^NVIM v(?P<version>[0-9]+\\.[0-9]+\\.[0-9]+)"

[helix]
[helix.linux]
manager = "github-release"
repo = "helix-editor/helix"
asset = "helix-{version}-x86_64-linux.tar.xz"
bin = "helix-{version}-x86_64-linux/hx"
install_name = "hx"
[helix.linux.version_probe]
command = ["{bin}", "--version"]
regex = "^helix (?P<version>[0-9]+\\.[0-9]+\\.[0-9]+)"

[zellij]
[zellij.linux]
manager = "github-release"
repo = "zellij-org/zellij"
asset = "zellij-x86_64-unknown-linux-musl.tar.gz"
bin = "zellij"
[zellij.linux.version_probe]
command = ["{bin}", "--version"]
regex = "^zellij (?P<version>[0-9]+\\.[0-9]+\\.[0-9]+)"

# ============================================================
# GitHub Release Tools
# ============================================================

[yq]
[yq.linux]
manager = "github-release"
repo = "mikefarah/yq"
asset = "yq_linux_amd64.tar.gz"
bin = "yq_linux_amd64"
install_name = "yq"
[yq.linux.version_probe]
command = ["{bin}", "--version"]
regex = "version (?P<version>[0-9]+\\.[0-9]+\\.[0-9]+)"

[marksman]
[marksman.linux]
manager = "github-release"
repo = "artempyanykh/marksman"
asset = "marksman-linux-x64"
bin = "marksman-linux-x64"
install_name = "marksman"

[zls]
[zls.linux]
manager = "github-release"
repo = "zigtools/zls"
asset = "zls-x86_64-linux.tar.xz"
bin = "zls"
install_name = "zls"
[zls.linux.version_probe]
command = ["{bin}", "--version"]
regex = "zls (?P<version>[0-9]+\\.[0-9]+\\.[0-9]+)"

[lua-lsp]
[lua-lsp.linux]
manager = "github-release"
repo = "LuaLS/lua-language-server"
asset = "lua-language-server-{version}-linux-x64.tar.gz"
bin = "bin/lua-language-server"
install_name = "lua-language-server"
[lua-lsp.linux.version_probe]
command = ["{bin}", "--version"]
regex = "(?P<version>[0-9]+\\.[0-9]+\\.[0-9]+)"

[xdotter]
[xdotter.linux]
manager = "github-release"
repo = "CNCSMonster/xdotter"
asset = "xd-x86_64-unknown-linux-musl"
bin = "xd-x86_64-unknown-linux-musl"
install_name = "xd"

[cargo-binstall]
[cargo-binstall.linux]
manager = "github-release"
repo = "cargo-bins/cargo-binstall"
asset = "cargo-binstall-x86_64-unknown-linux-musl.tgz"
bin = "cargo-binstall"
install_name = "cargo-binstall"

