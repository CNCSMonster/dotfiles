# Manifest for dotfiles development environment
# Migrated from: dotfiles/shells/common/install-functions.sh
# Tool count: 45+ tools across 6 manager types

# ============================================================
# GitHub release manager configuration
# ============================================================

[_github-release]
github_mirrors = ["https://ghfast.top", "https://mirror.ghproxy.com"]
timeout = 120
retry = 3

# ============================================================
# Languages & Toolchains
# ============================================================

# 安装 rustup 本身（vendor 脚本，已审查）
[rustup-install]
[rustup-install.linux]
manager = "script"
path = "scripts/install-rustup.sh"

# 配置 Rust 工具链（rustup manager）
[rust]
[rust.linux]
manager = "rustup"
components = ["clippy", "rustfmt", "rust-analyzer"]
profile = "minimal"
set_default = true

# ============================================================
# Editors
# ============================================================

[neovim]
[neovim.linux]
manager = "github-release"
repo = "neovim/neovim"
asset = "nvim-linux-x86_64.tar.gz"
bin = "nvim-linux-x86_64/bin/nvim"
install_name = "nvim"
[neovim.linux.version_probe]
command = ["{bin}", "--version"]
regex = "^NVIM v(?P<version>[0-9]+\\.[0-9]+\\.[0-9]+)"

[neovim.linux.x86_64]
sha256 = "31cf85945cb600d96cdf69f88bc68bec814acbff50863c5546adef3a1bcef260"

[neovim.linux.aarch64]
asset = "nvim-linux-arm64.tar.gz"
bin = "nvim-linux-arm64/bin/nvim"
