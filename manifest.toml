# Manifest for dotfiles development environment
# Migrated from: dotfiles/shells/common/install-functions.sh
# Tool count: 45+ tools across 6 manager types

# ============================================================
# GitHub release manager configuration
# ============================================================

[_github-release]
github_mirrors = ["https://ghfast.top", "https://mirror.ghproxy.com"]
timeout = 120
retry = 3

# ============================================================
# Experience / optional tools
# ============================================================

[wezterm]
[wezterm.linux]
manager = "script"
path = "scripts/install-wezterm.sh"
[wezterm.macos]
manager = "script"
path = "scripts/install-wezterm.sh"

# ============================================================
# System packages (managed by tool-installer)
# ============================================================

[system-packages]
[system-packages.linux]
manager = "script"
path = "scripts/install-system-packages.sh"
[system-packages.macos]
manager = "script"
path = "scripts/install-system-packages.sh"

# ============================================================
# Languages & Toolchains
# ============================================================

# 安装 rustup 本身（vendor 脚本，已审查）
[rustup-install]
[rustup-install.linux]
manager = "script"
path = "scripts/install-rustup.sh"
[rustup-install.macos]
manager = "script"
path = "scripts/install-rustup.sh"

# 通过 mise 安装语言运行时（在 cargo-tools 之后执行）
[mise-install]
[mise-install.linux]
manager = "script"
path = "scripts/mise-install.sh"
[mise-install.macos]
manager = "script"
path = "scripts/mise-install.sh"


# 配置 Rust 工具链（rustup manager）
[rust]
[rust.linux]
manager = "rustup"
components = ["clippy", "rustfmt", "rust-analyzer"]
profile = "minimal"
set_default = true
[rust.macos]
manager = "rustup"
components = ["clippy", "rustfmt", "rust-analyzer"]
profile = "minimal"
set_default = true


